name: SplitCore CI


on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.2'
        cache: true
        
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest

    - name: Run Tests
      run: go test -v ./internal/usecase/...
