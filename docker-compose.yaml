services:
  db:
    image: postgres:18.3-bookworm
    container_name: split_core_db
    restart: always
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASS}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    container_name: split_core_app
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      TOKEN: ${TOKEN}
      BOT_NAME: ${BOT_NAME}
      BOT_VER: ${BOT_VER}
      PG_USER: ${PG_USER}
      PG_PASS: ${PG_PASS}
      PG_DB: ${PG_DB}
      REDIS_HOST: redis
      PG_HOST: db
      PG_PORT: 5432
      REDIS_PORT: 6379
      REDIS_PASS: ${REDIS_PASS}
  migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./internal/repository/postgres_migrations:/migrations
    command: -path /migrations -database postgres://${PG_USER}:${PG_PASS}@db:5432/${PG_DB}?sslmode=disable up
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
  redis:
    image: redis:8.6.2-alpine
    container_name: split_core_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASS}
    command: >
      redis-server
      --requirepass ${REDIS_PASS}
      --appendonly yes

networks:
  default:
    name: split_network

volumes:
  postgres_data:
  redis_data:
